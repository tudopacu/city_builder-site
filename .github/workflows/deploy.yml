name: Deploy Phaser 3 Game

on:
  push:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          # TAG REFACTOR: Swapped static :latest with the unique commit SHA
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # REFACTOR: Handoff cluster coordination directly to the infrastructure repository
      - name: Notify Infrastructure Repo of New Image
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: tudopacu/city_builder-infrastructure
          event-type: update-image
          client-payload: '{"app": "react-frontend", "image": "ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"}'